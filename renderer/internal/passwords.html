<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Senhas — Brauze</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; min-height: 100vh;
      background: #1b1b1f; color: #e6e6e6;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
    }
    .container { max-width: 920px; margin: 0 auto; padding: 40px 24px; }
    h1 { font-size: 22px; margin: 0 0 6px; font-weight: 600; }
    .sub { color: #888; margin-bottom: 24px; font-size: 12px; }
    .toolbar { display: flex; gap: 8px; margin-bottom: 14px; }
    input.search {
      flex: 1; background: #25252b; border: 1px solid #34343c; color: #e6e6e6;
      border-radius: 6px; padding: 8px 12px; font-size: 13px; outline: none;
    }
    input.search:focus { border-color: #5a8dff; }
    table { width: 100%; border-collapse: collapse; }
    th, td {
      text-align: left; padding: 10px 12px; border-bottom: 1px solid #2a2a30;
      vertical-align: middle;
    }
    th { color: #888; font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: 0.4px; }
    tr:hover td { background: #25252b; }
    .pw-cell { display: flex; align-items: center; gap: 8px; font-family: ui-monospace, Menlo, monospace; color: #5a8dff; }
    .actions { display: flex; gap: 4px; justify-content: flex-end; }
    button {
      background: #2a2a30; border: 1px solid #34343c; color: #d8d8d8;
      font-size: 11px; padding: 4px 8px; border-radius: 4px; cursor: pointer;
    }
    button:hover { background: #34343c; color: #fff; }
    button.danger { color: #ff7373; }
    button.danger:hover { background: #4a1d1d; color: #fff; border-color: #7a3a3a; }
    .empty { color: #888; text-align: center; padding: 40px 0; }
    .hidden { display: none !important; }
    .badge { background: #2d3a52; color: #8ab4ff; font-size: 9px; padding: 2px 6px; border-radius: 3px; text-transform: uppercase; letter-spacing: 0.4px; margin-left: 6px; }
    .favicon { width: 16px; height: 16px; border-radius: 3px; vertical-align: middle; margin-right: 8px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Senhas salvas</h1>
    <div class="sub">Encryptadas localmente via OS keychain (safeStorage). Nunca saem deste profile.</div>
    <div class="toolbar">
      <input class="search" id="search" placeholder="Filtrar por site ou usuário…" spellcheck="false">
      <button id="check-all" style="background:#2a2a30;border:1px solid #34343c;color:#d8d8d8;border-radius:6px;padding:0 14px;cursor:pointer;font-size:12px;">Verificar vazamentos</button>
    </div>
    <table id="tbl">
      <thead>
        <tr>
          <th>Site</th>
          <th>Usuário</th>
          <th>Senha</th>
          <th>Última uso</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
    <div id="empty" class="empty hidden">Nenhuma senha salva ainda.</div>
  </div>
  <script>
    const $ = (s) => document.querySelector(s);
    const rowsEl = $('#rows');
    const emptyEl = $('#empty');
    const searchEl = $('#search');
    let allItems = [];

    function fmtDate(ts) {
      if (!ts) return '—';
      const d = new Date(ts);
      const dd = (n) => String(n).padStart(2, '0');
      return `${dd(d.getDate())}/${dd(d.getMonth() + 1)}/${d.getFullYear()}`;
    }

    function hostFrom(origin) {
      try { return new URL(origin).hostname; } catch { return origin; }
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }

    function render(items) {
      rowsEl.innerHTML = '';
      if (!items.length) {
        emptyEl.classList.remove('hidden');
        return;
      }
      emptyEl.classList.add('hidden');
      for (const it of items) {
        const tr = document.createElement('tr');
        const host = hostFrom(it.origin);
        tr.innerHTML =
          `<td><img class="favicon" src="https://www.google.com/s2/favicons?domain=${encodeURIComponent(host)}&sz=32"> ${escapeHtml(host)}${it.has_totp ? '<span class="badge">2FA</span>' : ''}</td>` +
          `<td>${escapeHtml(it.username)}</td>` +
          `<td><div class="pw-cell"><span class="pw-text">••••••••</span><button data-act="reveal" data-id="${it.id}">Mostrar</button><button data-act="copy" data-id="${it.id}">Copiar</button></div></td>` +
          `<td>${fmtDate(it.last_used_at)}</td>` +
          `<td><div class="actions">` +
            `<button data-act="totp" data-id="${it.id}">${it.has_totp ? '2FA ✓' : '+ 2FA'}</button>` +
            `<button data-act="delete" data-id="${it.id}" class="danger">Apagar</button>` +
          `</div></td>`;
        rowsEl.appendChild(tr);
      }

      rowsEl.querySelectorAll('button[data-act="reveal"]').forEach((b) => {
        b.addEventListener('click', async () => {
          const id = Number(b.dataset.id);
          const cred = await brauzeInternal.passwords.get(id);
          const txt = b.parentElement.querySelector('.pw-text');
          if (txt.textContent === '••••••••') { txt.textContent = cred.password; b.textContent = 'Esconder'; }
          else { txt.textContent = '••••••••'; b.textContent = 'Mostrar'; }
        });
      });
      rowsEl.querySelectorAll('button[data-act="copy"]').forEach((b) => {
        b.addEventListener('click', async () => {
          const id = Number(b.dataset.id);
          const cred = await brauzeInternal.passwords.get(id);
          await navigator.clipboard.writeText(cred.password);
          b.textContent = '✓';
          setTimeout(() => (b.textContent = 'Copiar'), 1200);
        });
      });
      rowsEl.querySelectorAll('button[data-act="totp"]').forEach((b) => {
        b.addEventListener('click', async () => {
          const id = Number(b.dataset.id);
          const secret = prompt('Cole o secret 2FA (base32 ou otpauth:// URI). Deixe em branco pra remover.');
          if (secret === null) return;
          await brauzeInternal.passwords.setTOTP(id, secret.trim() || null);
          await load();
        });
      });
      rowsEl.querySelectorAll('button[data-act="delete"]').forEach((b) => {
        b.addEventListener('click', async () => {
          if (!confirm('Apagar essa senha?')) return;
          await brauzeInternal.passwords.remove(Number(b.dataset.id));
          await load();
        });
      });
    }

    async function load() {
      try {
        allItems = await brauzeInternal.passwords.list();
      } catch (err) {
        rowsEl.innerHTML = `<tr><td colspan="5" class="empty">Erro: ${escapeHtml(String(err.message || err))}</td></tr>`;
        return;
      }
      filter();
    }

    function filter() {
      const q = searchEl.value.trim().toLowerCase();
      if (!q) return render(allItems);
      render(allItems.filter((it) => it.origin.toLowerCase().includes(q) || (it.username || '').toLowerCase().includes(q)));
    }

    searchEl.addEventListener('input', filter);

    document.getElementById('check-all').addEventListener('click', async (e) => {
      const btn = e.target;
      btn.disabled = true; btn.textContent = 'Verificando…';
      let pwned = 0, ok = 0;
      for (const it of allItems) {
        const r = await brauzeInternal.passwords.checkBreach(it.id);
        if (!r || !r.ok) continue;
        if (r.pwned) {
          pwned++;
          // Marca a row na UI
          const row = Array.from(rowsEl.children).find((tr) => tr.querySelector(`button[data-id="${it.id}"]`));
          if (row) {
            const cell = row.children[0];
            if (cell && !cell.querySelector('.breach-badge')) {
              cell.insertAdjacentHTML('beforeend', `<span class="badge" style="background:#4a1d1d;color:#ffb3b3;margin-left:6px">⚠ ${r.count.toLocaleString('pt-BR')}× vazada</span>`);
            }
          }
        }
        ok++;
      }
      btn.disabled = false;
      btn.textContent = pwned ? `${pwned}/${ok} vazadas — clique pra recheckar` : `Nenhuma vazada (${ok} verificadas)`;
    });

    load();
  </script>
</body>
</html>
